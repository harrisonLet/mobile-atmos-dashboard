<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Analysis - Mobile Atmos Dashboard</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
    --bg: #0b0e14;
    --panel: #121826;
    --panel-alt: #0f1422;
    --border: #1f2937;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --accent: #60a5fa;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    color: var(--text);
    background: var(--bg);
    height: 100vh;
    overflow: hidden;
}

/* Navigation */
nav {
    background: #020617;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.nav-container {
    display: flex;
    align-items: center;
    padding: 0 12px;
}

    /* .js-plotly-plot {
        outline: 2px solid red;
    } */

/* Ensure consistent nav height and vertical centering */
nav { height: 56px; }
.nav-container { height: 56px; }
.nav-menu { align-items: center; }
.nav-link { display: flex; align-items: center; height: 100%; }

.nav-brand {
    color: var(--text);
    font-size: 1.05rem;
    font-weight: 600;
    padding: 10px 12px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-logo { height: 28px; }

.nav-menu { display: flex; list-style: none; margin-left: auto; }

.nav-link {
    color: var(--muted);
    text-decoration: none;
    padding: 10px 14px;
    font-size: 0.9rem;
}


.nav-link:hover { color: var(--text); background: var(--panel-alt); }

/* Data selectors (shared) */
.data-selectors { display: flex; align-items: center; gap: 15px; padding: 10px 15px; }
.selector-group { display: flex; align-items: center; gap: 8px; }
.selector-group label { color: var(--muted); font-size: 0.85rem; font-weight: 500; margin-right: 6px; }
.selector-group select {
    /* Match button sizing and tone; use explicit height to avoid taller selects */
    padding: 4px 12px;
    font-size: 0.85rem;
    line-height: normal;
    height: 32px;
    background: var(--panel-alt);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
}

/* Layout used on analysis page */
.main-grid { display: flex; height: 47.5vh; gap: 5px; padding: 5px; }
.bottom-grid { display: flex; height: 47.5vh; gap: 5px; padding: 5px; }

.bottom-grid .panel > div {
    flex: 1;
    min-height: 0;
    height: 100%;
    width: 100%;
}

.panel {
    flex: 1; display: flex; flex-direction: column; background: var(--panel);
    border: 1px solid var(--border); padding: 8px; overflow: hidden;
}
.main-grid > .panel:first-child { /* selection map slightly smaller */
    flex: 0.9;
}
.main-grid > .panel:nth-child(2) { /* time series slightly larger */
    flex: 1.1;
}
/* Make the ethane vs methane plot slightly larger than the wind rose */
.bottom-grid > .panel:first-child { flex: 1.4; }
.bottom-grid > .panel:nth-child(2) { flex: 0.6; }
.panel h2 { margin: 0 0 6px 0; font-size: 0.95rem; color: var(--text); }
.panel iframe, .panel > div { flex: 1; width: 100%; }

.plotly-dark { background-color: var(--panel); color: var(--text); }

.layer-toggle { background: var(--panel-alt); color: var(--text); padding: 4px 8px; font-size: 0.75rem; cursor: pointer; border-radius: 4px; }
.layer-toggle:hover { background: var(--accent); color: #121826; }


@media (max-width: 800px) {
    .main-grid, .bottom-grid { flex-direction: column; height: 50vh; }
}
</style>
</head>

<body>
<nav>
    <div class="nav-container">

            <img src="/~u1460207/src/BlockU_RGB.png" alt="University of Utah" class="nav-logo">
            Analysis
        </a>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="/~u1460207/dashboard/" class="nav-link">Home</a>
            </li>
            <li class="nav-item">

            <li class="nav-item">

</nav>


<div class="main-grid">

</div>

<div class="bottom-grid">

    </div>

</div>

<script>

// Campaign date configurations
const datesByCampaign= {
    'slv': [
    { value: 'example', label: 'August 1, 2024' },
	{ value: '20260203', label: 'February 3, 2026'},
	{ value: '20260204', label: 'February 4, 2026'},
	{ value: '20260205', label: 'February 5, 2026'},
	{ value: '20260206', label: 'February 6, 2026'},
    { value: '20260208', label: 'February 8, 2026' },
    { value: '20260209', label: 'February 9, 2026' },
    { value: '20260210', label: 'February 10, 2026' },
    { value: '20260211', label: 'February 11, 2026' },
    { value: '20260212', label: 'February 12, 2026' },



    ],
    'arc': [
        { value: '20240716', label: '20240716' },
        { value: '20240717', label: '20240717' },
        { value: '20240718', label: '20240718' },
        { value: '20240719', label: '20240719' },
        { value: '20240721', label: '20240721' },
        { value: '20240722', label: '20240722' },
        { value: '20240723', label: '20240723' },
        { value: '20240725', label: '20240725' },
        { value: '20240726', label: '20240726' },
        { value: '20240727', label: '20240727' },
        { value: '20240728', label: '20240728' },
        { value: '20240729', label: '20240729' },
        { value: '20240730', label: '20240730' },
        { value: '20240731', label: '20240731' },
        { value: '20240802', label: '20240802' },
        { value: '20240803', label: '20240803' },
        { value: '20240804', label: '20240804' },
    ],
    'slc-sos': [
    ]
};

let currentData = [];
let selectionMap = null;
let startMarker = null;
let endMarker = null;
let selectionPolyline = null;


const campaignSelect = document.getElementById('campaignSelect');
const dateSelect = document.getElementById('dateSelect');


// Get URL parameters
const urlParams = new URLSearchParams(window.location.search);

campaignSelect.value = urlParams.get('campaign') || 'slv';

populateDates();

// Event listeners
campaignSelect.addEventListener('change', e => {
    console.log('campaignSelect changed:', e.target.value);
    populateDates();
});

dateSelect.addEventListener('change', e => {
    console.log('dateSelect changed:', e.target.value);
    loadDate();
});

function getPaths() {
    return {
        csv: `../data/${campaignSelect.value}/${dateSelect.value}/${dateSelect.value}.csv`,
    };
}

function loadDate() {
    const paths = getPaths();

    console.log("Loading CSV from:", paths.csv);

    Papa.parse(paths.csv, {
        download: true,
        header: true,
        dynamicTyping: true,
        skipEmptyLines: true,
        complete: r => {
            console.log("CSV loaded successfully");
            parseData(r.data);
        },
        error: err => {
            console.error("Error loading CSV:", err);
            alert("Error loading CSV file: " + paths.csv + "\n" + err);
        }
    });
}

function parseData(rows) {
    console.log("Raw rows received:", rows.length);
    console.log("First row:", rows[0]);
    
    currentData = rows.map(r => ({
        time: new Date(r["TIMESTAMP"]),
        ch4: r["CH4 (ppm)"],
        c2h6: r["C2H6 (ppb)"],
        windDir: r["GPSCorWindDirTrue (deg)"] ?? r["Wind Direction (Deg True)"],
        windSpeed: r["GPSCorWindSpeed (m/s)"] ?? r["Wind Speed (m/s)"],
        lat: r["Latitude (DD.ddd +N)"],
        lon: r["Longitude (DDD.ddd -W)"]
    }))
    .filter(d => 
        d.time instanceof Date &&
        !isNaN(d.time) &&
        isFinite(d.ch4) &&
        isFinite(d.c2h6) &&
        isFinite(d.windDir) &&
        isFinite(d.windSpeed)
    );

    console.log("Filtered data length:", currentData.length);
    console.log("First filtered point:", currentData[0]);

    plotTimeSeries();
    plotCH4Ethane(currentData);
    plotWindRose(currentData);
    plotSelectionMap(currentData);
}

function plotTimeSeries() {
    const ethaneFiltered = currentData.map(d => d.c2h6 >= 0 ? d.c2h6 : null);
    
    const traceCH4 = {
        x: currentData.map(d => d.time),
        y: currentData.map(d => d.ch4),
        type: "scattergl",
        mode: "lines+markers",
        marker: { size: 2, opacity: 0 },
        line: { width: 1.5, color: '#1f77b4' },
        name: "CH₄ (ppm)",
        yaxis: 'y'
    };

    const traceC2H6 = {
        x: currentData.map(d => d.time),
        y: ethaneFiltered,
        type: "scattergl",
        mode: "lines+markers",
        marker: { size: 2, opacity: 0 },
        line: { width: 1.5, color: '#CFFF04' },
        name: "C₂H₆ (ppb)",
        yaxis: 'y2'
    };

    const layout = {
        autosize: true,

        dragmode: "select",
        paper_bgcolor: "#0b0e14",
        plot_bgcolor: "#020617",
        xaxis: {
            title: {
                text: "Time (UTC)",
                font: { color: "#9ca3af" }
            },
            tickfont: { color: "#9ca3af" },
            gridcolor: "#1f2937",
            zerolinecolor: "#1f2937"
        },
        yaxis: {
            title: {
                text: "CH₄ (ppm)",
                font: { color: "#60a5fa" }
            },
            tickfont: { color: "#60a5fa" },
            gridcolor: "#1f2937",
            zerolinecolor: "#1f2937"
        },
        yaxis2: {
            title: {
                text: "C₂H₆ (ppb)",
                font: { color: "#CFFF04" }
            },
            tickfont: { color: "#CFFF04" },
            overlaying: "y",
            side: "right",
            gridcolor: "#1f2937",
            zerolinecolor: "#1f2937"
        },
        legend: {
            x: 0.01,
            y: 0.99,
            bgcolor: "rgba(2,6,23,0.85)",
            bordercolor: "#1f2937",
            borderwidth: 1,
            font: { color: "#e5e7eb", size: 12 }
        },
        margin: { l: 60, r: 60, t: 50, b: 45 },
        selectdirection: "h"
    };

    Plotly.newPlot("timeSeries", [traceCH4, traceC2H6], layout);

    document.getElementById("timeSeries")
        .on("plotly_selected", e => {
            if (!e) return;
            const selected = e.points.map(p => currentData[p.pointIndex]);
            plotCH4Ethane(selected);
            plotWindRose(selected);
            plotSelectionMap(selected);
        });
}


function plotCH4Ethane(data) {
    const x = data.map(d => d.ch4);
    const y = data.map(d => d.c2h6 / 1000); // Convert ppb to ppm

    const trace = {
        x: x,
        y: y,
        mode: "markers",
        type: "scattergl",
        marker: { color: "#CFFF04", size: 6, opacity: 0.7 },
        name: "Data"
    };

    let n = x.length;
    let slope = 0;
    let r2 = 0;
    let annotations = [];

    if (n > 1) {
        const sumX = x.reduce((a,b) => a+b, 0);
        const sumY = y.reduce((a,b) => a+b, 0);
        const sumXY = x.reduce((acc, xi, i) => acc + xi*y[i], 0);
        const sumX2 = x.reduce((acc, xi) => acc + xi*xi, 0);
        const sumY2 = y.reduce((acc, yi) => acc + yi*yi, 0);

        slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
        const intercept = (sumY - slope*sumX) / n;

        // Calculate R²
        const meanY = sumY / n;
        const ssTotal = y.reduce((acc, yi) => acc + Math.pow(yi - meanY, 2), 0);
        const yFit = x.map(xi => slope*xi + intercept);
        const ssResidual = y.reduce((acc, yi, i) => acc + Math.pow(yi - yFit[i], 2), 0);
        r2 = 1 - (ssResidual / ssTotal);

        var traceRegression = {
            x: x,
            y: yFit,
            mode: "lines",
            line: { color: "#60a5fa", width: 2 },
            name: "Regression",
            hoverinfo: "none",
        };

        // Add annotation with slope and R²
        annotations = [{
            x: 0.5,
            y: 0.95,
            xref: 'paper',
            yref: 'paper',
            text: `Slope: ${slope.toFixed(4)} C2H6/CH4<br>R²: ${r2.toFixed(3)}`,
            showarrow: false,
            font: {
                color: '#e5e7eb',
                size: 14,
                family: 'monospace'
            },
            bgcolor: 'rgba(18, 24, 38, 0.8)',
            bordercolor: '#60a5fa',
            borderwidth: 1,
            borderpad: 8,
            align: 'left'
        }];
    }

    const plotlyDarkLayout = {
        margin: { l: 55, r: 20, t: 20, b: 45 },
        height: document.getElementById('ch4Ethane').closest('.panel').clientHeight - 16,
        autosize: true,
        paper_bgcolor: '#121826',
        plot_bgcolor: '#121826',
        font: { color: '#e5e7eb' },
        xaxis: { 
            title: "CH4 (ppm)",
            gridcolor: '#1f2937'
        },
        yaxis: { 
            title: "C2H6 (ppm)",
            gridcolor: '#1f2937'
        },
        showlegend: false,
        annotations: annotations
    };

    const traces = n > 1 ? [trace, traceRegression] : [trace];

    Plotly.newPlot("ch4Ethane", traces, plotlyDarkLayout, { responsive: true });
}

function plotWindRose(data) {
    const dirBins = 16;
    const dirBinSize = 360 / dirBins;

    // Speed bins (m/s)
    const speedBins = [
        { label: "0–2", min: 0, max: 2, color: "#60a5fa" },
        { label: "2–4", min: 2, max: 4, color: "#34d399" },
        { label: "4–6", min: 4, max: 6, color: "#fbbf24" },
        { label: "6–8", min: 6, max: 8, color: "#fb7185" },
        { label: ">8",  min: 8, max: Infinity, color: "#ef4444" }
    ];

    // counts[speedBin][dirBin]
    const counts = speedBins.map(() => Array(dirBins).fill(0));

    data.forEach(d => {
        if (!isFinite(d.windDir) || !isFinite(d.windSpeed)) return;

        const dirIdx = Math.floor(d.windDir / dirBinSize) % dirBins;

        const speedIdx = speedBins.findIndex(
            b => d.windSpeed >= b.min && d.windSpeed < b.max
        );

        if (speedIdx !== -1) {
            counts[speedIdx][dirIdx] += 1;
        }
    });

    const theta = [...Array(dirBins).keys()].map(i => i * dirBinSize);

    const traces = speedBins.map((bin, i) => ({
        type: "barpolar",
        r: counts[i],
        theta: theta,
        width: dirBinSize,
        name: `${bin.label} m/s`,
        marker: {
            color: bin.color,
            opacity: 0.85
        }
    }));

    Plotly.newPlot("windRose", traces, {

        margin: { l: 20, r: 20, t: 20, b: 20 },

        height: document.getElementById('windRose').closest('.panel').clientHeight - 16,
        autosize: true,


        paper_bgcolor: "#121826",

        plot_bgcolor: "#121826",
        font: { color: "#e5e7eb" },
        polar: {
            angularaxis: {
                direction: "clockwise",
                rotation: 90
            },
            radialaxis: {
                title: "Frequency",
                gridcolor: "#1f2937"
            }
        },
        legend: {
            orientation: "h",
            x: 0.5,
            y: -0.15,
            xanchor: "center"
        }
    }, { responsive: true });
}


function plotSelectionMap(data) {
    if (data.length === 0) return;
    
    const validGPSData = data.filter(d =>
    isFinite(d.lat) &&
    isFinite(d.lon) &&
    Math.abs(d.lat) > 1 &&      // kills 0 or near-0
    Math.abs(d.lon) > 1
    );
    
    if (validGPSData.length === 0) {
        console.log("No valid GPS coordinates in selection");
        return;
    }
    
    const startPoint = validGPSData[0];
    const endPoint = validGPSData[validGPSData.length - 1];
    
    if (!selectionMap) {
        selectionMap = L.map('selectionMap').setView(
            [startPoint.lat, startPoint.lon],
            13
        );

        const osm = L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }
        );

        const satellite = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            {
                maxZoom: 19,
                attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics'
            }
        );

        satellite.addTo(selectionMap);

        const baseLayers = {
            "Satellite": satellite,
            "OpenStreetMap": osm
        };

        let isSatellite = true;

        const toggleControl = L.control({ position: 'topright' });

        toggleControl.onAdd = function () {
            const div = L.DomUtil.create('div', 'layer-toggle');
            div.innerHTML = 'open';
            L.DomEvent.disableClickPropagation(div);

            div.onclick = () => {
                if (isSatellite) {
                    selectionMap.removeLayer(satellite);
                    osm.addTo(selectionMap);
                    div.innerHTML = 'sat';
                } else {
                    selectionMap.removeLayer(osm);
                    satellite.addTo(selectionMap);
                    div.innerHTML = 'open';
                }
                isSatellite = !isSatellite;
            };

            return div;
        };

        toggleControl.addTo(selectionMap);
    }
    
    if (startMarker) selectionMap.removeLayer(startMarker);
    if (endMarker) selectionMap.removeLayer(endMarker);
    
    const startIcon = L.divIcon({
        className: 'selection-marker',
        html: `
            <div style="
                width: 15px;
                height: 15px;
                background: #ffffff;
                border: 2.5px solid green;
                border-radius: 50%;
                box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
            "></div>
        `,
        iconSize: [10, 10],
        iconAnchor: [5, 5]
    });

    const endIcon = L.divIcon({
        className: 'selection-marker',
        html: `
            <div style="
                width: 15px;
                height: 15px;
                background: #ffffff;
                border: 2.5px solid red;
                border-radius: 50%;
                box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
            "></div>
        `,
        iconSize: [10, 10],
        iconAnchor: [5, 5]
    });
    
    startMarker = L.marker([startPoint.lat, startPoint.lon], { icon: startIcon })
        .bindPopup(`<b>Start Point</b><br>Time: ${startPoint.time.toISOString()}<br>CH₄: ${startPoint.ch4.toFixed(2)} ppm<br>C₂H₆: ${startPoint.c2h6.toFixed(2)} ppb`)
        .addTo(selectionMap);
    
    endMarker = L.marker([endPoint.lat, endPoint.lon], { icon: endIcon })
        .bindPopup(`<b>End Point</b><br>Time: ${endPoint.time.toISOString()}<br>CH₄: ${endPoint.ch4.toFixed(2)} ppm<br>C₂H₆: ${endPoint.c2h6.toFixed(2)} ppb`)
        .addTo(selectionMap);
    
    // Remove previous polyline if present
    if (selectionPolyline) {
        selectionMap.removeLayer(selectionPolyline);
        selectionPolyline = null;
    }

    // Create a path polyline following the GPS coordinates (sorted by time to avoid stray straight chords)
    const pathCoords = validGPSData
        .slice()
        .sort((a, b) => new Date(a.time) - new Date(b.time))
        .map(d => [d.lat, d.lon]);
    if (pathCoords.length > 0) {
        selectionPolyline = L.polyline(pathCoords, { color: '#CFFF04', weight: 3, opacity: 0.85 });
        selectionPolyline.addTo(selectionMap);

        // Fit to polyline bounds if possible
        try {
            const polyBounds = selectionPolyline.getBounds();
            if (polyBounds.isValid()) {
                selectionMap.fitBounds(polyBounds, { padding: [50, 50] });
            }
        } catch (err) {
            // Fallback to start/end bounds
            const bounds = L.latLngBounds([
                [startPoint.lat, startPoint.lon],
                [endPoint.lat, endPoint.lon]
            ]);
            selectionMap.fitBounds(bounds, { padding: [50, 50] });
        }
    }
}

function loadFromSelectors() {
    const campaign = campaignSelect.value;
    const date = dateSelect.value;

    if (!campaign || !date) return;

    loadDate();
}

function populateDates() {
    const campaign = campaignSelect.value || 'slv';
    const dates = datesByCampaign[campaign] || [];

    dateSelect.innerHTML = '<option value="">Select a date...</option>';
    dates.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d.value;
        opt.textContent = d.label;
        dateSelect.appendChild(opt);
    });

    // If dates were added, auto-select the first and load it so the UI updates
    if (dates.length > 0) {
        dateSelect.value = dates[0].value;
        console.log('populateDates: auto-selected', dateSelect.value, 'for', campaignSelect.value);
        loadDate();
    }
    else {
        // No dates available, handle accordingly
        console.warn('populateDates: no dates available for', campaign);
    }
}

</script>
