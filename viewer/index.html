<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Viewer - Mobile Atmos Dashboard</title>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #121826;
            --panel-alt: #0f1422;
            --border: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #60a5fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
        }

    /* Navigation */
    nav { background: #020617; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
    .nav-container { display: flex; align-items: center; padding: 0 12px; }
    .nav-brand { color: var(--text); font-size: 1.05rem; font-weight: 600; padding: 10px 12px; text-decoration: none; display: flex; align-items: center; gap: 10px; }
    .nav-logo { height: 28px; }
    .nav-menu { display: flex; list-style: none; margin-left: auto; }
    .nav-link { color: var(--muted); text-decoration: none; padding: 10px 14px; font-size: 0.9rem; }
    .nav-link:hover { color: var(--text); background: var(--panel-alt); }

    /* Ensure consistent nav height and vertical centering */
    nav { height: 56px; }
    .nav-container { height: 56px; }
    .nav-menu { align-items: center; }
    .nav-link { display: flex; align-items: center; height: 100%; }

        /* Data selectors */
        .data-selectors { display: flex; align-items: center; gap: 15px; padding: 10px 15px; }
    .selector-group { display: flex; align-items: center; gap: 8px; }
    .selector-group label { color: var(--muted); font-size: 0.85rem; font-weight: 500; margin-right: 6px; }
        .selector-group select {
            /* Match button sizing and tone; use explicit height to avoid taller selects */
            padding: 4px 12px;
            font-size: 0.85rem;
            line-height: normal;
            height: 32px;
            background: var(--panel-alt);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
        }

        /* Map container */
        #mapFrame { width: 100%; height: calc(100vh - 50px); border: none; display: block; }
        .loading { display: flex; align-items: center; justify-content: center; height: calc(100vh - 50px); font-size: 1.2em; color: var(--muted); }

        @media (max-width: 800px) { #mapFrame, .loading { height: calc(100vh - 90px); } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/~u1460207/dashboard/" class="nav-brand">
                <img src="/~u1460207/src/BlockU_RGB.png" alt="University of Utah" class="nav-logo">
                Map Viewer
            </a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/~u1460207/dashboard/" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="/~u1460207/dashboard/viewer/" class="nav-link">Map Viewer</a>
                </li>
                <li class="nav-item">
                    <a href="/~u1460207/dashboard/analysis/" class="nav-link">Analysis</a>
                </li>
                <li class="nav-item">
                    <a href="/~u1460207/dashboard/about/" class="nav-link">About</a>
                </li>
                <li class="data-selectors">
                    <div class="selector-group">
                        <label for="campaignSelect">Campaign:</label>
                        <select id="campaignSelect">
                            <option value="slv">Salt Lake Valley</option>
                            <option value="arc">ARC</option>
                            <option value="slc-sos">SLC-SOS</option>
                        </select>
                    </div>
                    <div class="selector-group">
                        <label for="dateSelect">Date:</label>
                        <select id="dateSelect">
                            <option value="">Select a date...</option>
                        </select>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <iframe id="mapFrame" src=""></iframe>
    <div class="loading" id="loading">Select a campaign and date to view map</div>

    <script>
        // Campaign date configurations
        const campaignDates = {
            'slv': [
                { value: 'example', label: 'August 1, 2024' },
                { value: '20260203', label: 'February 3, 2026' },
                { value: '20260205', label: 'February 5, 2026' },
		        { value: '20260206', label: 'February 6, 2026' },
        		{ value: '20260208', label: 'February  8, 2026' },
         		{ value: '20260209', label: 'February 9, 2026' },               
        		{ value: '20260210', label: 'February 10, 2026' },
         		{ value: '20260211', label: 'February 11, 2026' },
               
        		{ value: '20260212', label: 'February 12, 2026' },

            ],
            'arc': [
                { value: '20240716', label: '20240716' },
                { value: '20240717', label: '20240717' },
                { value: '20240718', label: '20240718' },
                { value: '20240719', label: '20240719' },
                { value: '20240721', label: '20240721' },
                { value: '20240722', label: '20240722' },
                { value: '20240723', label: '20240723' },
                { value: '20240725', label: '20240725' },
                { value: '20240726', label: '20240726' },
                { value: '20240727', label: '20240727' },
                { value: '20240728', label: '20240728' },
                { value: '20240729', label: '20240729' },
                { value: '20240730', label: '20240730' },
                { value: '20240731', label: '20240731' },
                { value: '20240802', label: '20240802' },
                { value: '20240803', label: '20240803' },
                { value: '20240804', label: '20240804' },
            ],
            'slc-sos': [
            ]
        };

        const campaignSelect = document.getElementById('campaignSelect');
        const dateSelect = document.getElementById('dateSelect');
        const mapFrame = document.getElementById('mapFrame');
        const loading = document.getElementById('loading');

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const initialCampaign = urlParams.get('campaign') || 'slv';

        // Initialize
        campaignSelect.value = initialCampaign;
        updateDateOptions();

        // Event listeners
        campaignSelect.addEventListener('change', e => {
            console.log('campaignSelect changed:', e.target.value);
            updateDateOptions();
        });

        dateSelect.addEventListener('change', e => {
            console.log('dateSelect changed:', e.target.value);
            loadMap();
        });

        function updateDateOptions() {
            const campaign = campaignSelect.value;
            const dates = campaignDates[campaign] || [];
            
            dateSelect.innerHTML = '<option value="">Select a date...</option>';
            dates.forEach(date => {
                const option = document.createElement('option');
                option.value = date.value;
                option.textContent = date.label;
                dateSelect.appendChild(option);
            });

            // Auto-select first date if available
            if (dates.length > 0) {
                dateSelect.value = dates[0].value;
                console.log('updateDateOptions: auto-selected', dateSelect.value, 'for', campaign);
                loadMap();
            } 
            else {
                // no dates available for campaign
                mapFrame.style.display = 'none';
                loading.style.display = 'flex';
                loading.textContent = 'No dates available for selected campaign';
            }
        }

        function loadMap() {
            const campaign = campaignSelect.value;
            const date = dateSelect.value;

            if (!date) {
                mapFrame.style.display = 'none';
                loading.style.display = 'flex';
                return;
            }

            const mapPath = `/~u1460207/dashboard/data/${campaign}/${date}/${date}_map.html`;
            
            console.log('Attempting to load map:', mapPath);

            // Check existence of the map HTML before setting iframe src so we can show a clear error
            fetch(mapPath, { method: 'HEAD' })
                .then(resp => {
                    if (resp.ok) {
                        loading.style.display = 'none';
                        mapFrame.style.display = 'block';
                        mapFrame.src = mapPath;
                    } else {
                        mapFrame.style.display = 'none';
                        loading.style.display = 'flex';
                        loading.textContent = 'Map not found for selected campaign/date';
                        console.warn('Map HEAD check failed:', resp.status, resp.statusText, mapPath);
                    }
                })
                .catch(err => {
                    mapFrame.style.display = 'none';
                    loading.style.display = 'flex';
                    loading.textContent = 'Error loading map (network)';
                    console.error('Error checking map path:', err);
                });
        }

        // Log iframe load events
        mapFrame.addEventListener('load', () => {
            console.log('Map iframe loaded:', mapFrame.src);
        });
    </script>
</body>
</html>
